<div class="wrapper" style="max-width:480px;margin:40px auto;padding:24px;border:1px solid #e5e7eb;border-radius:8px;background:#fff;">
  <h3 style="margin-top:0;">Patient Portal Login</h3>
  <div class="form-group">
    <label>Phone Number or Patient Code</label>
    <input type="text" class="form-control" [(ngModel)]="loginId" />
  </div>
  <div class="form-group">
    <label>Password</label>
    <input type="password" class="form-control" [(ngModel)]="password" />
  </div>
  <div *ngIf="errorMessage" class="text-danger" style="margin-bottom:10px;">{{errorMessage}}</div>
  <button class="btn btn-primary" (click)="doLogin()" [disabled]="loading">
    {{ loading ? 'Signing in...' : 'Sign In' }}
  </button>
</div>
